version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: ferry-postgres
    environment:
      POSTGRES_DB: ferrydb
      POSTGRES_USER: ferryuser
      POSTGRES_PASSWORD: ferrypass
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ferryuser -d ferrydb"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: ferry-booking-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ferrydb
      SPRING_DATASOURCE_USERNAME: ferryuser
      SPRING_DATASOURCE_PASSWORD: ferrypass
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  postgres-data:
